<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sex Hub - Premium Videos</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff0055;
        }
        header h1 {
            margin: 0;
            color: #ff0055;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h2 {
            color: #ccc;
            border-left: 5px solid #ff0055;
            padding-left: 10px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.03);
        }
        .video-card iframe {
            width: 100%;
            height: 200px;
            border: none;
        }
        .video-title {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #ddd;
            text-align: center;
        }
        footer {
            background-color: #000;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    </header>

        <div class="video-grid" id="videos">
